    <script>
      async function getLogo() {
        try {
          const response = await fetch('https://back-preprod.izisafety.fr/params/logo', {
            headers: {
              'x-tenant-hostname': location.hostname.includes('localhost')
                ? '%TENANT_HOSTNAME_FALLBACK%'
                : location.hostname
            }
          });
          if (response.ok) {
            const data = await response.text();
            document.getElementById('splashImageId').setAttribute('src', data);
          }
        } catch (err) {
          //failed handling platform's logo
          //console.log('failed to load logo');
        }
      }
      getLogo();
    </script>
